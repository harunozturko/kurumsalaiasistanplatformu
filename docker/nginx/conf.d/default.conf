# ─── Upstream tanımları ────────────────────────────────────────────────────
upstream php_upstream {
    server php:9000;
}

upstream angular_upstream {
    server angular:4200;
}

# ─── Ana sunucu bloğu ──────────────────────────────────────────────────────
server {
    listen 80;
    server_name _;

    root /var/www/html/public;
    index index.php;

    client_max_body_size 64M;
    server_tokens off;

    # ─── Symfony: /api, debug toolbar, profiler ──────────────────────────
    location ~ ^/(api|_wdt|_profiler|bundles) {
        try_files $uri /index.php$is_args$args;
    }

    # ─── PHP-FPM FastCGI (Symfony front controller) ───────────────────────
    location ~ ^/index\.php(/|$) {
        fastcgi_pass php_upstream;
        fastcgi_split_path_info ^(.+\.php)(/.*)$;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param DOCUMENT_ROOT   $document_root;
        fastcgi_param HTTP_PROXY      "";
        fastcgi_buffers      16 16k;
        fastcgi_buffer_size  32k;
        fastcgi_read_timeout 300;
        # internal işaretlisi: bu location'a doğrudan erişim engellenir
        internal;
    }

    # ─── Diğer .php dosyalarına doğrudan erişimi engelle ─────────────────
    location ~ \.php$ {
        return 404;
    }

    # ─── Angular dev sunucusuna proxy (WebSocket desteğiyle) ─────────────
    location / {
        proxy_pass         http://angular_upstream;
        proxy_http_version 1.1;

        # WebSocket (HMR / hot reload için gerekli)
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_cache_bypass  $http_upgrade;
        proxy_read_timeout  86400s;
        proxy_send_timeout  86400s;
        proxy_connect_timeout 10s;
    }

    # ─── Statik dosyalar için cache ───────────────────────────────────────
    location ~* \.(ico|css|js|gif|jpeg|jpg|png|woff|woff2|ttf|svg|eot|otf|webp)$ {
        expires 1d;
        add_header Cache-Control "public, immutable";
        try_files $uri @angular_proxy;
    }

    location @angular_proxy {
        proxy_pass http://angular_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    # ─── Loglar ───────────────────────────────────────────────────────────
    access_log /var/log/nginx/access.log;
    error_log  /var/log/nginx/error.log warn;
}
