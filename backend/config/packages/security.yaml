security:
    # Parola hash algoritması. 'auto' = mevcut en güçlü algoritma (bcrypt/argon2).
    # https://symfony.com/doc/current/security.html#registering-the-user-hashing-passwords
    password_hashers:
        Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface: 'auto'

    # Kullanıcıların nereden yükleneceği. Artık bellekteki sahte kullanıcılar değil,
    # User entity'si veritabanından e-posta ile yüklenir.
    providers:
        app_user_provider:
            entity:
                class: App\Entity\User
                property: email

    firewalls:
        dev:
            # Geliştirici araçları ve statik dosyalar her zaman serbest.
            pattern: ^/(_profiler|_wdt|assets|build)/
            security: false

        api:
            pattern: ^/api
            stateless: true            # Oturum (session) tutmayız; her istek token taşır.
            provider: app_user_provider
            entry_point: App\Security\JwtAuthenticator
            custom_authenticators:
                - App\Security\JwtAuthenticator

    # Sadece *ilk* eşleşen kural uygulanır (sıra önemlidir).
    access_control:
        # Public uç noktalar — token gerektirmez:
        - { path: ^/api/health,   roles: PUBLIC_ACCESS }
        - { path: ^/api/register, roles: PUBLIC_ACCESS }
        - { path: ^/api/login,    roles: PUBLIC_ACCESS }
        # Korumalı uç noktalar — geçerli JWT (ROLE_USER) gerekir:
        - { path: ^/api/me,       roles: ROLE_USER }

when@test:
    security:
        password_hashers:
            # Password hashers are resource-intensive by design to ensure security.
            # In tests, it's safe to reduce their cost to improve performance.
            Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface:
                algorithm: auto
                cost: 4 # Lowest possible value for bcrypt
                time_cost: 3 # Lowest possible value for argon
                memory_cost: 10 # Lowest possible value for argon
